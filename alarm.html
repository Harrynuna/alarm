<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日付アラーム">
  <meta name="theme-color" content="#1c1c1e">
  <title>日付アラーム</title>
  <style>
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --card: #2c2c2e;
      --border: #3a3a3c;
      --accent: #ff9f0a;
      --accent2: #ff6b35;
      --text: #ffffff;
      --text2: #ebebf5cc;
      --text3: #ebebf599;
      --danger: #ff453a;
      --success: #30d158;
      --radius: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: env(safe-area-inset-top, 44px) 16px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header .subtitle {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }
    .btn-add {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255,159,10,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-add:active { transform: scale(0.92); box-shadow: 0 2px 6px rgba(255,159,10,0.3); }

    /* ── Main ── */
    .main {
      padding: 16px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 64px 32px;
    }
    .empty .icon { font-size: 64px; margin-bottom: 16px; }
    .empty h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
    .empty p { font-size: 14px; color: var(--text3); line-height: 1.5; }

    /* ── Alarm Card ── */
    .alarm-list { display: flex; flex-direction: column; gap: 10px; }

    .alarm-card-wrap {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }
    .alarm-card-delete {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 80px;
      background: var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .alarm-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.2s;
      position: relative;
      z-index: 1;
      touch-action: pan-y;
      user-select: none;
    }
    .alarm-card.sliding { transition: transform 0.2s; }
    .alarm-card:active { background: var(--bg3); }
    .alarm-card.disabled { opacity: 0.45; }

    .alarm-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255,159,10,0.35);
    }
    .alarm-card.disabled .alarm-icon {
      background: var(--bg3);
      box-shadow: none;
    }

    .alarm-info { flex: 1; min-width: 0; }
    .alarm-time {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: -1px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .alarm-date {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      margin-top: 2px;
    }
    .alarm-card.disabled .alarm-date { color: var(--text3); }
    .alarm-name {
      font-size: 12px;
      color: var(--text3);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .alarm-repeat {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .alarm-toggle {
      flex-shrink: 0;
      width: 51px;
      height: 31px;
      background: var(--bg3);
      border-radius: 16px;
      position: relative;
      cursor: pointer;
      transition: background 0.25s;
    }
    .alarm-toggle.on { background: var(--success); }
    .alarm-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 27px; height: 27px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .alarm-toggle.on::after { transform: translateX(20px); }

    /* ── Fired overlay ── */
    .alarm-firing {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      backdrop-filter: blur(10px);
    }
    .alarm-firing .fire-icon { font-size: 80px; animation: pulse 0.8s infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }
    .alarm-firing h2 { font-size: 28px; font-weight: 700; text-align: center; }
    .alarm-firing p { font-size: 16px; color: var(--text2); text-align: center; max-width: 260px; }
    .alarm-firing .fire-time { font-size: 64px; font-weight: 200; letter-spacing: -2px; color: var(--accent); }
    .btn-stop {
      margin-top: 16px;
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,69,58,0.4);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 100%;
      background: var(--bg2);
      border-radius: 24px 24px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 20px);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 4px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 4px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .btn-modal {
      background: none;
      border: none;
      font-size: 16px;
      color: var(--accent);
      cursor: pointer;
      padding: 4px 8px;
      font-weight: 500;
    }
    .btn-modal.cancel { color: var(--text3); }
    .btn-modal.save { font-weight: 700; }

    /* ── Form ── */
    .form-section {
      margin: 12px 16px;
      background: var(--bg3);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .form-section-title {
      font-size: 12px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px;
      margin-top: 16px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .form-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .form-row:last-child { border-bottom: none; }

    .form-label {
      font-size: 15px;
      color: var(--text2);
      min-width: 72px;
    }

    .form-row input[type="date"],
    .form-row input[type="time"],
    .form-row input[type="text"],
    .form-row textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      text-align: right;
      outline: none;
      -webkit-appearance: none;
    }
    .form-row input[type="date"]::-webkit-calendar-picker-indicator,
    .form-row input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.5);
      cursor: pointer;
    }
    .form-row textarea {
      resize: none;
      min-height: 60px;
      text-align: left;
      padding-top: 2px;
      line-height: 1.5;
    }
    input::placeholder, textarea::placeholder { color: var(--text3); }

    /* Repeat buttons */
    .repeat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 16px;
    }
    .repeat-btn {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }
    .repeat-btn.active {
      background: rgba(255,159,10,0.18);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Sound grid */
    .sound-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 0;
    }
    .sound-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: none;
      border: none;
      border-bottom: 0.5px solid var(--border);
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }
    .sound-btn:last-child { border-bottom: none; }
    .sound-btn:active { background: var(--bg2); }
    .sound-btn .sound-icon { font-size: 20px; width: 28px; text-align: center; }
    .sound-btn .sound-check {
      margin-left: auto;
      color: var(--accent);
      font-size: 18px;
      opacity: 0;
    }
    .sound-btn.active .sound-check { opacity: 1; }
    .sound-btn.active { color: var(--accent); }
    .preview-btn {
      margin-left: auto;
      background: var(--bg2);
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      color: var(--text3);
    }

    /* ── Section labels ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin: 20px 0 8px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Countdown ── */
    .countdown-badge {
      display: inline-block;
      background: rgba(255,159,10,0.15);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 50px;
      margin-top: 4px;
    }
    .alarm-card.disabled .countdown-badge { background: var(--bg3); color: var(--text3); }

    /* ── Active indicator ── */
    .active-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div>
      <h1>⏰ 日付アラーム</h1>
      <div class="subtitle" id="headerSubtitle">現在時刻: --:--</div>
    </div>
    <button class="btn-add" onclick="openModal()" aria-label="アラームを追加">＋</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div id="emptyState" class="empty">
    <div class="icon">🔔</div>
    <h2>アラームがありません</h2>
    <p>右上の ＋ ボタンを押して<br>日付指定のアラームを追加しましょう</p>
  </div>
  <div id="alarmList" class="alarm-list"></div>
</div>

<!-- Firing overlay -->
<div id="firingOverlay" class="alarm-firing" style="display:none;">
  <div class="fire-icon">🔔</div>
  <div class="fire-time" id="fireTime">--:--</div>
  <h2 id="fireName">アラーム</h2>
  <p id="fireMemo"></p>
  <button class="btn-stop" onclick="stopAlarm()">⏹ アラームを止める</button>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="btn-modal cancel" onclick="closeModal()">キャンセル</button>
      <span class="modal-title" id="modalTitle">新しいアラーム</span>
      <button class="btn-modal save" onclick="saveAlarm()">保存</button>
    </div>

    <div class="form-section-title">日時</div>
    <div class="form-section">
      <div class="form-row">
        <span class="form-label">📅 日付</span>
        <input type="date" id="inputDate">
      </div>
      <div class="form-row">
        <span class="form-label">🕐 時刻</span>
        <input type="time" id="inputTime">
      </div>
    </div>

    <div class="form-section-title">くり返し</div>
    <div class="form-section">
      <div class="repeat-grid" id="repeatGrid">
        <button class="repeat-btn active" data-repeat="none" onclick="selectRepeat('none')">なし</button>
        <button class="repeat-btn" data-repeat="daily" onclick="selectRepeat('daily')">毎日</button>
        <button class="repeat-btn" data-repeat="weekly" onclick="selectRepeat('weekly')">毎週</button>
        <button class="repeat-btn" data-repeat="monthly" onclick="selectRepeat('monthly')">毎月</button>
      </div>
    </div>

    <div class="form-section-title">ラベル</div>
    <div class="form-section">
      <div class="form-row">
        <span class="form-label">🏷 名前</span>
        <input type="text" id="inputName" placeholder="アラーム名（省略可）" maxlength="30">
      </div>
      <div class="form-row" style="align-items:flex-start;">
        <span class="form-label" style="padding-top:2px;">📝 メモ</span>
        <textarea id="inputMemo" placeholder="メモ（省略可）" maxlength="100"></textarea>
      </div>
    </div>

    <div class="form-section-title">サウンド</div>
    <div class="form-section">
      <div class="sound-grid" id="soundGrid">
        <!-- populated by JS -->
      </div>
    </div>

    <div style="height: 12px;"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ===== SOUNDS via Web Audio API ===== */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const SOUNDS = [
  { id: 'bell',      label: 'ベル',         icon: '🔔', fn: soundBell },
  { id: 'chime',     label: 'チャイム',     icon: '🎵', fn: soundChime },
  { id: 'digital',   label: 'デジタル',     icon: '📱', fn: soundDigital },
  { id: 'gentle',    label: 'やさしい音',   icon: '🌸', fn: soundGentle },
  { id: 'urgent',    label: '緊急アラーム', icon: '🚨', fn: soundUrgent },
];

function soundBell(ctx, t) {
  [[0,880],[0.6,660],[1.2,880],[1.8,660]].forEach(([dt,freq]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t+dt);
    g.gain.linearRampToValueAtTime(0.4, t+dt+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.55);
    o.start(t+dt); o.stop(t+dt+0.6);
  });
}

function soundChime(ctx, t) {
  [523,659,784,1047].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const dt = i * 0.28;
    g.gain.setValueAtTime(0, t+dt);
    g.gain.linearRampToValueAtTime(0.35, t+dt+0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.8);
    o.start(t+dt); o.stop(t+dt+0.85);
  });
}

function soundDigital(ctx, t) {
  for (let i = 0; i < 6; i++) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square'; o.frequency.value = i % 2 === 0 ? 1200 : 800;
    const dt = i * 0.18;
    g.gain.setValueAtTime(0, t+dt);
    g.gain.linearRampToValueAtTime(0.2, t+dt+0.02);
    g.gain.setValueAtTime(0.2, t+dt+0.12);
    g.gain.linearRampToValueAtTime(0, t+dt+0.15);
    o.start(t+dt); o.stop(t+dt+0.16);
  }
}

function soundGentle(ctx, t) {
  [440,550,660].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const dt = i * 0.5;
    g.gain.setValueAtTime(0, t+dt);
    g.gain.linearRampToValueAtTime(0.25, t+dt+0.2);
    g.gain.exponentialRampToValueAtTime(0.001, t+dt+1.2);
    o.start(t+dt); o.stop(t+dt+1.3);
  });
}

function soundUrgent(ctx, t) {
  for (let i = 0; i < 8; i++) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = i % 2 === 0 ? 1500 : 1000;
    const dt = i * 0.12;
    g.gain.setValueAtTime(0, t+dt);
    g.gain.linearRampToValueAtTime(0.3, t+dt+0.03);
    g.gain.setValueAtTime(0.3, t+dt+0.09);
    g.gain.linearRampToValueAtTime(0, t+dt+0.11);
    o.start(t+dt); o.stop(t+dt+0.12);
  }
}

let alarmInterval = null;

function playSound(soundId, loops = 1) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const sound = SOUNDS.find(s => s.id === soundId) || SOUNDS[0];
  let t = ctx.currentTime;
  for (let i = 0; i < loops; i++) {
    sound.fn(ctx, t + i * 2.5);
  }
}

function startAlarmLoop(soundId) {
  stopAlarmLoop();
  playSound(soundId, 3);
  alarmInterval = setInterval(() => playSound(soundId, 3), 8000);
}

function stopAlarmLoop() {
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
}

/* ===== DATA ===== */
let alarms = [];
let editingId = null;
let selectedRepeat = 'none';
let selectedSound = 'bell';
let firingAlarmId = null;

function loadAlarms() {
  try { alarms = JSON.parse(localStorage.getItem('alarms_v2') || '[]'); } catch(e) { alarms = []; }
}
function saveAlarms() {
  localStorage.setItem('alarms_v2', JSON.stringify(alarms));
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ===== DATETIME HELPERS ===== */
function pad(n) { return String(n).padStart(2,'0'); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function nowTimeStr() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function getNextFire(alarm) {
  const now = new Date();
  if (alarm.repeat === 'none') {
    const d = new Date(`${alarm.date}T${alarm.time}:00`);
    return d > now ? d : null;
  }
  let base = new Date(`${alarm.date}T${alarm.time}:00`);
  if (base <= now) {
    if (alarm.repeat === 'daily') {
      while (base <= now) base.setDate(base.getDate() + 1);
    } else if (alarm.repeat === 'weekly') {
      while (base <= now) base.setDate(base.getDate() + 7);
    } else if (alarm.repeat === 'monthly') {
      while (base <= now) base.setMonth(base.getMonth() + 1);
    }
  }
  return base;
}

function formatFire(d) {
  if (!d) return '期限切れ';
  const now = new Date();
  const diff = Math.round((d - now) / 60000);
  if (diff < 1) return 'まもなく';
  if (diff < 60) return `${diff}分後`;
  if (diff < 1440) return `${Math.floor(diff/60)}時間${diff%60>0?diff%60+'分':''}後`;
  const days = Math.floor(diff / 1440);
  return `${days}日後`;
}

function repeatLabel(r) {
  return { none:'', daily:'毎日', weekly:'毎週', monthly:'毎月' }[r] || '';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

/* ===== RENDER ===== */
function render() {
  const list = document.getElementById('alarmList');
  const empty = document.getElementById('emptyState');

  if (alarms.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  // Sort: enabled first, then by next fire time
  const sorted = [...alarms].sort((a, b) => {
    if (a.enabled !== b.enabled) return b.enabled - a.enabled;
    const fa = getNextFire(a), fb = getNextFire(b);
    if (!fa && !fb) return 0;
    if (!fa) return 1;
    if (!fb) return -1;
    return fa - fb;
  });

  list.innerHTML = sorted.map(alarm => {
    const next = alarm.enabled ? getNextFire(alarm) : null;
    const countdown = alarm.enabled ? formatFire(next) : 'オフ';
    const expired = alarm.enabled && !next;
    const rLabel = repeatLabel(alarm.repeat);
    const dLabel = alarm.repeat === 'none' ? formatDate(alarm.date) : (formatDate(alarm.date) + 'から');

    return `
    <div class="alarm-card-wrap" id="wrap-${alarm.id}">
      <div class="alarm-card-delete" onclick="deleteAlarm('${alarm.id}')">🗑 削除</div>
      <div class="alarm-card ${alarm.enabled ? '' : 'disabled'} ${expired ? 'expired' : ''}"
           id="card-${alarm.id}"
           onclick="editAlarm('${alarm.id}')"
           data-id="${alarm.id}">
        <div class="alarm-icon">${alarm.enabled ? (expired ? '⏰' : '🔔') : '🔕'}</div>
        <div class="alarm-info">
          <div class="alarm-time">${alarm.time}</div>
          <div class="alarm-date">${dLabel}${rLabel ? ' · '+rLabel : ''}</div>
          ${alarm.name ? `<div class="alarm-name">${alarm.name}${alarm.memo ? ' — ' + alarm.memo : ''}</div>` : ''}
          <span class="countdown-badge">${countdown}</span>
        </div>
        <div class="alarm-toggle ${alarm.enabled ? 'on' : ''}"
             onclick="toggleAlarm(event,'${alarm.id}')"></div>
      </div>
    </div>`;
  }).join('');

  // Touch swipe to reveal delete
  sorted.forEach(alarm => setupSwipe(alarm.id));
}

function setupSwipe(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  let startX = 0, currentX = 0, swiping = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    swiping = true;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!swiping) return;
    currentX = e.touches[0].clientX - startX;
    if (currentX < 0) {
      card.style.transform = `translateX(${Math.max(currentX, -80)}px)`;
    } else if (currentX > 0) {
      card.style.transform = 'translateX(0)';
    }
  }, { passive: true });
  card.addEventListener('touchend', () => {
    swiping = false;
    if (currentX < -40) {
      card.style.transform = 'translateX(-80px)';
    } else {
      card.style.transform = 'translateX(0)';
    }
    currentX = 0;
  });
}

/* ===== TOGGLE / DELETE ===== */
function toggleAlarm(e, id) {
  e.stopPropagation();
  const alarm = alarms.find(a => a.id === id);
  if (!alarm) return;
  alarm.enabled = !alarm.enabled;
  saveAlarms();
  render();
  showToast(alarm.enabled ? '🔔 アラームをオンにしました' : '🔕 アラームをオフにしました');
}

function deleteAlarm(id) {
  if (!confirm('このアラームを削除しますか？')) return;
  alarms = alarms.filter(a => a.id !== id);
  saveAlarms();
  render();
  showToast('🗑 アラームを削除しました');
}

/* ===== MODAL ===== */
function buildSoundGrid() {
  const grid = document.getElementById('soundGrid');
  grid.innerHTML = SOUNDS.map(s => `
    <button class="sound-btn ${selectedSound === s.id ? 'active' : ''}" onclick="selectSound('${s.id}')">
      <span class="sound-icon">${s.icon}</span>
      <span>${s.label}</span>
      <button class="preview-btn" onclick="previewSound(event,'${s.id}')">▶</button>
      <span class="sound-check">✓</span>
    </button>
  `).join('');
}

function selectRepeat(val) {
  selectedRepeat = val;
  document.querySelectorAll('.repeat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.repeat === val);
  });
}

function selectSound(id) {
  selectedSound = id;
  buildSoundGrid();
  playSound(id, 1);
}

function previewSound(e, id) {
  e.stopPropagation();
  playSound(id, 1);
}

function openModal(alarm = null) {
  editingId = alarm ? alarm.id : null;
  selectedRepeat = alarm ? alarm.repeat : 'none';
  selectedSound = alarm ? alarm.sound : 'bell';

  document.getElementById('modalTitle').textContent = alarm ? 'アラームを編集' : '新しいアラーム';
  document.getElementById('inputDate').value = alarm ? alarm.date : todayStr();
  document.getElementById('inputTime').value = alarm ? alarm.time : nowTimeStr();
  document.getElementById('inputName').value = alarm ? alarm.name : '';
  document.getElementById('inputMemo').value = alarm ? alarm.memo : '';

  document.querySelectorAll('.repeat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.repeat === selectedRepeat);
  });
  buildSoundGrid();

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('inputTime').focus(), 400);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function editAlarm(id) {
  const alarm = alarms.find(a => a.id === id);
  if (alarm) openModal(alarm);
}

function saveAlarm() {
  const date = document.getElementById('inputDate').value;
  const time = document.getElementById('inputTime').value;
  if (!date || !time) { showToast('⚠️ 日付と時刻を入力してください'); return; }

  const name = document.getElementById('inputName').value.trim();
  const memo = document.getElementById('inputMemo').value.trim();

  if (editingId) {
    const alarm = alarms.find(a => a.id === editingId);
    if (alarm) {
      alarm.date = date; alarm.time = time;
      alarm.repeat = selectedRepeat; alarm.sound = selectedSound;
      alarm.name = name; alarm.memo = memo;
    }
  } else {
    alarms.push({
      id: genId(), date, time,
      repeat: selectedRepeat, sound: selectedSound,
      name, memo, enabled: true
    });
  }
  saveAlarms();
  closeModal();
  render();
  showToast(editingId ? '✅ アラームを更新しました' : '✅ アラームを追加しました');
}

/* ===== ALARM CHECK ===== */
function checkAlarms() {
  const now = new Date();
  const nowMin = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

  for (const alarm of alarms) {
    if (!alarm.enabled) continue;
    const fireMin = `${alarm.date}T${alarm.time}`;
    if (fireMin === nowMin && firingAlarmId !== alarm.id) {
      fireAlarm(alarm);
      if (alarm.repeat === 'none') {
        alarm.enabled = false;
        saveAlarms();
      }
    }
  }
  render();
}

function fireAlarm(alarm) {
  firingAlarmId = alarm.id;
  document.getElementById('fireTime').textContent = alarm.time;
  document.getElementById('fireName').textContent = alarm.name || 'アラーム';
  document.getElementById('fireMemo').textContent = alarm.memo || '';
  document.getElementById('firingOverlay').style.display = 'flex';
  startAlarmLoop(alarm.sound || 'bell');

  // Vibration
  if (navigator.vibrate) navigator.vibrate([500,200,500,200,500,200,1000]);
}

function stopAlarm() {
  stopAlarmLoop();
  if (navigator.vibrate) navigator.vibrate(0);
  document.getElementById('firingOverlay').style.display = 'none';
  firingAlarmId = null;
}

/* ===== HEADER CLOCK ===== */
function updateClock() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('headerSubtitle').textContent =
    `${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}） ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

/* ===== TOAST ===== */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== INIT ===== */
loadAlarms();
render();
updateClock();
setInterval(updateClock, 1000);
setInterval(checkAlarms, 10000); // check every 10s

// Also check on visibility change (when app is foregrounded)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) checkAlarms();
});

// Request notification permission (for future enhancement)
if ('Notification' in window && Notification.permission === 'default') {
  // Don't auto-prompt; user can trigger via interaction
}

// Show install hint for iOS
if (window.navigator.standalone === false && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
  setTimeout(() => showToast('💡 ホーム画面に追加するとより便利です'), 3000);
}
</script>
